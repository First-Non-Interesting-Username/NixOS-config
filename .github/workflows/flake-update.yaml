name: Update flake.lock

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  check:
    uses: ./.github/workflows/flake-check.yml

  update:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: changes
        run: |
          git diff --exit-code flake.lock || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Open PR if changed
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update flake.lock"
          title: "chore: weekly flake.lock update"
          body: |
            Automated `flake.lock` update via `nix flake update`.
            Please review input changes before merging.
          branch: "bot/flake-lock-update"
          delete-branch: true
          labels: dependencies

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-failure',
              state: 'open'
            });

            const title = '❌ flake.lock update failed';
            const existing = issues.find(i => i.title === title);
            const body = `## flake.lock Update Failure\n\n` +
              `**Workflow:** ${context.workflow}\n` +
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n` +
              `**Triggered by:** \`${context.eventName}\`\n` +
              `**Date:** ${new Date().toUTCString()}\n\n` +
              `The flake check or update process failed. Check the run logs above for details.`;

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure']
              });
            }
